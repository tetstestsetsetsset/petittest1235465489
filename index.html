  <script>
    // ── File System Access API — stockage JSON local (OneDrive, etc.) ──────────
    const FS_IDB = "compta_fs_handle_v1";

    async function idbGet(key) {
      return new Promise((res, rej) => {
        const req = indexedDB.open("compta_fs_db", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("handles");
        req.onsuccess = e => {
          const tx = e.target.result.transaction("handles", "readonly");
          const r2 = tx.objectStore("handles").get(key);
          r2.onsuccess = () => res(r2.result);
          r2.onerror = () => res(null);
        };
        req.onerror = () => res(null);
      });
    }
    async function idbSet(key, val) {
      return new Promise((res, rej) => {
        const req = indexedDB.open("compta_fs_db", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("handles");
        req.onsuccess = e => {
          const tx = e.target.result.transaction("handles", "readwrite");
          tx.objectStore("handles").put(val, key);
          tx.oncomplete = () => res();
          tx.onerror = () => res();
        };
        req.onerror = () => res();
      });
    }
    async function idbDel(key) {
      return new Promise(res => {
        const req = indexedDB.open("compta_fs_db", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("handles");
        req.onsuccess = e => {
          const tx = e.target.result.transaction("handles", "readwrite");
          tx.objectStore("handles").delete(key);
          tx.oncomplete = () => res();
          tx.onerror = () => res();
        };
        req.onerror = () => res();
      });
    }

    window.__fsGetHandle    = () => idbGet(FS_IDB);
    window.__fsStoreHandle  = h  => idbSet(FS_IDB, h);
    window.__fsClearHandle  = ()  => idbDel(FS_IDB);
    window.__fsSupported    = ("showOpenFilePicker" in window);
  </script>

const isAssociation = row => (row.regime||"mensuel") === "association";
const hasTVA = row => {
  const r = row.regime||"mensuel";
  return r !== "annuel" && r !== "association" && r !== "acompte";
};
const baseRegime = row => {
  const r = row.regime||"mensuel";
  return r;
};
const isClosingMonth = (row, dateStr) => {
  if (!dateStr) return false;
  const month = parseInt(dateStr.split("-")[1]);
  const r = row.regime || "mensuel";
  const key = r.startsWith("association") ? "association" : r;
  const cm = CLOSING_MONTHS_MAP[key] || CLOSING_MONTHS_MAP["mensuel"];
  return cm.includes(month);
};

const getNextTVADate = (row, refDateStr) => {
  if (!hasTVA(row)||!refDateStr||!row.tvaDayOfMonth) return null;
  const ref = new Date(refDateStr); ref.setHours(0,0,0,0);
  const day = parseInt(row.tvaDayOfMonth);
  const regime = baseRegime(row);
  if (regime==="mensuel") {
    const last = new Date(ref.getFullYear(),ref.getMonth()+1,0).getDate();
    const tgt  = new Date(ref.getFullYear(),ref.getMonth(),Math.min(day,last));
    tgt.setHours(0,0,0,0); return tgt;
  }
  if (regime==="trimestriel") {
    const refM = ref.getMonth()+1;
    let qM = TVA_QUARTERS.find(m=>m>=refM), qY=ref.getFullYear();
    if(!qM){qM=TVA_QUARTERS[0];qY++;}
    const last=new Date(qY,qM,0).getDate();
    let tgt=new Date(qY,qM-1,Math.min(day,last)); tgt.setHours(0,0,0,0);
    if(tgt<ref){
      const idx=TVA_QUARTERS.indexOf(qM);
      const ni=(idx+1)%TVA_QUARTERS.length;
      qM=TVA_QUARTERS[ni]; if(ni===0)qY++;
      const last2=new Date(qY,qM,0).getDate();
      tgt=new Date(qY,qM-1,Math.min(day,last2)); tgt.setHours(0,0,0,0);
    }
    return tgt;
  }
  return null;
};
const daysUntilNext = (row,refDateStr) => {
  const tgt=getNextTVADate(row,refDateStr);
  if(!tgt||!refDateStr) return null;
  const ref=new Date(refDateStr); ref.setHours(0,0,0,0);
  return Math.ceil((tgt-ref)/86400000);
};
const businessDaysUntil = (row,refDateStr) => {
  const tgt=getNextTVADate(row,refDateStr);
  if(!tgt||!refDateStr) return null;
  const ref=new Date(refDateStr); ref.setHours(0,0,0,0);
  let count=0; const cur=new Date(ref);
  while(cur<tgt){
    cur.setDate(cur.getDate()+1);
    const dow=cur.getDay();
    if(dow!==0&&dow!==6) count++;
  }
  return count;
};

const exportCSV = (rows, refDate) => {
  const h=["Client","Docs","Compta","Régime","Clôture","Prochain TVA (jour)","Jours rest.","Dernière relance","Notes"];
  const lines=[h.join(";"), ...rows.map(r=>{
    const cs=getComptaStatus(r);
    const csl=cs==="done"?"Validé":cs==="progress"?"En cours":cs==="todo"?"Non commencé":"—";
    const tgt=getNextTVADate(r,refDate);
    const days=daysUntilNext(r,refDate);
    const lastRel=[...(r.relances||[])].sort((a,b)=>b.date.localeCompare(a.date))[0];
    const tvaStr=!hasTVA(r)?"Sans TVA":tgt?`${String(tgt.getDate()).padStart(2,"0")}`:"—";
    return [r.client,r.docsRecu?"Oui":"Non",csl,r.regime||"mensuel",isClosingMonth(r,refDate)?"Oui":"Non",
      tvaStr,days!==null?days:"—",lastRel?fmtDate(lastRel.date):"—",r.notes||""]
      .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";");
  })];
  const blob=new Blob(["\uFEFF"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="dossiers.csv";a.click();
  URL.revokeObjectURL(url);
};

          ?<span style={{fontSize:13}}>🚨</span>

        {urgent?`${TVA_STATUS_LABEL[tvaSt]} · ${bizDays}j ouvré${bizDays>1?"s":""}`:delegue&&bizDays!==null&&bizDays<=2?`Délégué · ${bizDays}j ouvré${bizDays>1?"s":""}`:TVA_STATUS_LABEL[tvaSt]}
        <span style={{fontSize:9,opacity:.6}}>▾</span>
      </button>
      {open&&menuPos&&(
        <div style={{position:"fixed",top:menuPos.y,left:menuPos.x,zIndex:9999,
          background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
          boxShadow:C.shadowMd,overflow:"hidden",minWidth:120}}>
          {TVA_STATUS_LIST.map(s=>{
            const ss=TVA_STATUS_STYLE[s];
            const active=tvaSt===s;
            return(
              <button key={s} onClick={()=>{onUpdate(row.id,s);setOpen(false);}}
                style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 14px",
                  border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12.5,fontWeight:active?700:500,
                  background:active?ss.bg:C.card,color:active?ss.color:C.text,
                  textAlign:"left",transition:"background .12s"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:ss.color,flexShrink:0}}/>
                {TVA_STATUS_LABEL[s]}
                {active&&<span style={{marginLeft:"auto",fontSize:11,color:ss.color}}>✓</span>}
              </button>);
          })}
        </div>)}
    </div>);
}

function DaysChip({days}){
  if(days===null||days===undefined) return <span style={{color:C.light}}>—</span>;
  if(days<0) return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:99,background:C.redL,color:C.red,fontSize:11.5,fontWeight:700,border:`1px solid ${C.red}44`}}>⚠ {Math.abs(days)}j dépassé</span>;
  if(days===0) return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:99,background:C.redL,color:C.red,fontSize:11.5,fontWeight:700,border:`1px solid ${C.red}44`}}>🔥 Aujourd'hui</span>;
  if(days<=3) return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:99,background:C.redL,color:C.red,fontSize:11.5,fontWeight:700,border:`1px solid ${C.red}44`}}>⚡ {days}j</span>;
  if(days<=7) return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:99,background:C.orangeL,color:C.orange,fontSize:11.5,fontWeight:700,border:`1px solid ${C.orange}44`}}>⏳ {days}j</span>;
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:99,background:"#f0eeeb",color:C.muted,fontSize:11.5,fontWeight:600}}>🕐 {days}j</span>;
}

function StatCard({label,value,sub,color,total,icon,onClick}){
  const pct=total&&value!==undefined?Math.round(value/total*100):null;
  const col=color||C.text;
  return(
    <div style={{
      background:C.card,border:`1px solid ${C.border}`,borderRadius:18,
      padding:"18px 22px 16px",boxShadow:C.shadow,flex:1,minWidth:120,
      position:"relative",overflow:"hidden",transition:"box-shadow .18s",
      cursor:onClick?"pointer":"default"
    }}
    onClick={onClick}
    onMouseEnter={e=>{e.currentTarget.style.boxShadow=C.shadowMd;if(onClick)e.currentTarget.style.transform="translateY(-1px)";}}
    onMouseLeave={e=>{e.currentTarget.style.boxShadow=C.shadow;e.currentTarget.style.transform="none";}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,borderRadius:"18px 18px 0 0",background:col,opacity:.75}}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:20,lineHeight:1}}>{icon}</div>
        {pct!==null&&(
          <span style={{fontSize:10.5,fontWeight:700,color:col,background:col+"18",
            border:`1px solid ${col}33`,borderRadius:99,padding:"2px 9px"}}>
            {pct}%
          </span>)}
      </div>
      <div style={{fontSize:32,fontWeight:700,fontFamily:"'Lora',serif",color:col,lineHeight:1,marginBottom:4}}>
        {value}
      </div>
      <div style={{fontSize:11.5,fontWeight:600,color:C.muted,letterSpacing:.2}}>{label}</div>
      {sub&&<div style={{fontSize:10.5,color:C.light,marginTop:2}}>{sub}</div>}
      {pct!==null&&(
        <div style={{marginTop:12,background:C.borderL,borderRadius:99,height:5,overflow:"hidden"}}>
          <div style={{height:5,borderRadius:99,width:`${pct}%`,background:col,
            transition:"width .6s cubic-bezier(.4,0,.2,1)"}}/>
        </div>)}
      {pct!==null&&total&&(
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
          <span style={{fontSize:9.5,color:C.light}}>{value} / {total}</span>
          <span style={{fontSize:9.5,color:C.light}}>dossiers</span>
        </div>)}
    </div>);
}

function ComptaModal({row,onClose,onUpdate}){
  const [tasksDone,setTasksDone]=useState({...(row.tasksDone||{})});
  const [tasksComments,setTasksComments]=useState({...(row.tasksComments||{})});
  const [openComment,setOpenComment]=useState(null);
  const [commentDraft,setCommentDraft]=useState("");
  const en=ALL_TASKS.filter(t=>row.tasksEnabled?.[t.key]);
  // Clôture annuelle — actif si le mois courant = mois de clôture du dossier
  const nowMonth=new Date().getMonth()+1;
  const isClosingMonth=getClosingWorkMonth(row.clotureMois||12)===nowMonth;
  const closingEnabled=row.closingTasksEnabled||{};
  const closingTasks=CLOSING_TASKS.filter(t=>closingEnabled[t.key]!==false); // toutes actives par défaut à la clôture
  const toggle=key=>{const n={...tasksDone,[key]:!tasksDone[key]};setTasksDone(n);onUpdate(row.id,n,tasksComments);};
  const cntMonthly=en.filter(t=>tasksDone[t.key]).length;
  const cntClosing=isClosingMonth?closingTasks.filter(t=>tasksDone[t.key]).length:0;
  const cnt=cntMonthly+cntClosing;
  const total=en.length+(isClosingMonth?closingTasks.length:0);
  const pct=total?Math.round(cnt/total*100):0;
  const allDone=cnt===total&&total>0;
  const toggleAll=()=>{
    const n={};
    const allTasks=[...en,...(isClosingMonth?closingTasks:[])];
    if(!allDone) allTasks.forEach(t=>{n[t.key]=true;});
    else allTasks.forEach(t=>{n[t.key]=false;});
    setTasksDone(n);onUpdate(row.id,n,tasksComments);
  };
  const openCommentFor=key=>{
    setOpenComment(key);
    setCommentDraft(tasksComments[key]||"");
  };
  const saveComment=key=>{
    const n={...tasksComments,[key]:commentDraft.trim()};
    setTasksComments(n);
    onUpdate(row.id,tasksDone,n);
    setOpenComment(null);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(30,25,20,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:C.card,borderRadius:20,padding:"30px 34px",width:460,maxWidth:"95vw",boxShadow:C.shadowLg,animation:"slideUp .22s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
          <div>
            <div style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:600,fontStyle:"italic"}}>Comptabilité</div>
            <div style={{fontSize:13,color:C.muted,marginTop:2,fontWeight:600}}>{row.client}</div>
          </div>
          <button onClick={onClose} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:C.muted,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        <div style={{marginBottom:22}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
            <span style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:.8}}>Avancement</span>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {en.length>0&&<button onClick={toggleAll} style={{fontSize:11,padding:"3px 10px",borderRadius:7,border:`1px solid ${allDone?C.border:C.sage}`,background:allDone?"transparent":C.sageL,color:allDone?C.muted:C.sageD,cursor:"pointer",fontFamily:"inherit",fontWeight:700,transition:"all .15s"}}>{allDone?"Tout décocher":"Tout cocher"}</button>}
              <span style={{fontSize:18,fontWeight:700,fontFamily:"'Lora',serif",color:pct===100?C.sage:C.text}}>{pct}%</span>
            </div>
          </div>
          <div style={{background:C.border,borderRadius:99,height:6}}>
            <div style={{height:6,borderRadius:99,width:`${pct}%`,transition:"width .4s ease",background:pct===100?`linear-gradient(90deg,${C.sage},#a8c9b0)`:`linear-gradient(90deg,${C.lav},${C.blue})`}}/>
          </div>
          <div style={{fontSize:11,color:C.light,marginTop:5}}>{cnt}/{total} tâches complétées</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:"55vh",overflowY:"auto",paddingRight:2}}>
          {en.length===0&&!isClosingMonth&&(
            <div style={{textAlign:"center",color:C.light,fontSize:13,padding:"20px 0"}}>Aucune tâche configurée.</div>
          )}
          {en.map(task=>{
            const done=!!tasksDone[task.key];
            const comment=tasksComments[task.key]||"";
            const isOpen=openComment===task.key;
              return(
                <div key={task.key}>
                  <div onClick={()=>toggle(task.key)}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:comment?`10px 10px 0 0`:12,cursor:"pointer",transition:"all .16s",background:done?C.sageL:C.bg,border:`1.5px solid ${done?"#cde0d3":C.border}`,borderBottom:comment||isOpen?`1.5px solid ${done?"#cde0d3":C.border}`:undefined}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:18}}>{task.icon}</span>
                      <div>
                        <span style={{fontSize:14,fontWeight:600,color:done?C.sageD:C.text}}>{task.label}</span>
                        {comment&&!isOpen&&<div style={{fontSize:11.5,color:C.blue,fontStyle:"italic",marginTop:2}}>{comment}</div>}
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {done&&<span style={{fontSize:11,color:C.sage,fontWeight:700}}>Fait</span>}
                      <button onClick={e=>{e.stopPropagation();isOpen?setOpenComment(null):openCommentFor(task.key);}}
                        style={{padding:"3px 7px",borderRadius:6,border:`1px solid ${comment?C.blue:C.border}`,background:comment?C.blueL:"transparent",color:comment?C.blue:C.light,fontSize:13,cursor:"pointer",lineHeight:1,transition:"all .15s"}}
                        title={comment?"Modifier le commentaire":"Ajouter un commentaire"}>💬</button>
                      <div style={{width:34,height:19,borderRadius:99,background:done?C.sage:C.border,position:"relative",flexShrink:0,transition:"all .22s"}}>
                        <div style={{position:"absolute",top:3,left:done?18:3,width:13,height:13,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.18)",transition:"left .22s"}}/>
                      </div>
                    </div>
                  </div>
                  {isOpen&&(
                    <div style={{background:C.bg,border:`1.5px solid ${done?"#cde0d3":C.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 14px",display:"flex",gap:8}}>
                      <input autoFocus value={commentDraft} onChange={e=>setCommentDraft(e.target.value)}
                        onKeyDown={e=>{if(e.key==="Enter")saveComment(task.key);if(e.key==="Escape")setOpenComment(null);}}
                        placeholder="Note sur cette tâche…"
                        style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"6px 10px",fontSize:12.5,fontFamily:"inherit",color:C.text,outline:"none"}}/>
                      <button onClick={()=>saveComment(task.key)}
                        style={{padding:"6px 12px",borderRadius:7,border:"none",background:C.blue,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>OK</button>
                      {comment&&<button onClick={()=>{const n={...tasksComments,[task.key]:""};setTasksComments(n);onUpdate(row.id,tasksDone,n);setOpenComment(null);}}
                        style={{padding:"6px 10px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>}
                    </div>)}
                </div>);
            })}
            {isClosingMonth&&closingTasks.length>0&&(
              <div style={{marginTop:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 4px 6px"}}>
                  <div style={{flex:1,height:1,background:C.border}}/>
                  <span style={{fontSize:11,fontWeight:700,color:"#b45309",textTransform:"uppercase",letterSpacing:.8,whiteSpace:"nowrap"}}>⭐ Clôture annuelle — {MONTHS_FR[(row.clotureMois||12)-1]}</span>
                  <div style={{flex:1,height:1,background:C.border}}/>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {closingTasks.map(task=>{
                    const done=!!tasksDone[task.key];
                    const comment=tasksComments[task.key]||"";
                    const isOpen=openComment===task.key;
                    return(
                      <div key={task.key}>
                        <div onClick={()=>toggle(task.key)}
                          style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:comment?`10px 10px 0 0`:12,cursor:"pointer",transition:"all .16s",background:done?"#fef3e2":C.bg,border:`1.5px solid ${done?"#f0c060":C.border}`}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <span style={{fontSize:18}}>{task.icon}</span>
                            <div>
                              <span style={{fontSize:14,fontWeight:600,color:done?"#b45309":C.text}}>{task.label}</span>
                              {comment&&!isOpen&&<div style={{fontSize:11.5,color:C.blue,fontStyle:"italic",marginTop:2}}>{comment}</div>}
                            </div>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            {done&&<span style={{fontSize:11,color:"#b45309",fontWeight:700}}>Fait</span>}
                            <button onClick={e=>{e.stopPropagation();isOpen?setOpenComment(null):openCommentFor(task.key);}}
                              style={{padding:"3px 7px",borderRadius:6,border:`1px solid ${comment?C.blue:C.border}`,background:comment?C.blueL:"transparent",color:comment?C.blue:C.light,fontSize:13,cursor:"pointer",lineHeight:1,transition:"all .15s"}}
                              title={comment?"Modifier le commentaire":"Ajouter un commentaire"}>💬</button>
                            <div style={{width:34,height:19,borderRadius:99,background:done?"#f0a030":C.border,position:"relative",flexShrink:0,transition:"all .22s"}}>
                              <div style={{position:"absolute",top:3,left:done?18:3,width:13,height:13,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 3px rgba(0,0,0,.18)",transition:"left .22s"}}/>
                            </div>
                          </div>
                        </div>
                        {isOpen&&(
                          <div style={{background:C.bg,border:`1.5px solid ${done?"#f0c060":C.border}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"10px 14px",display:"flex",gap:8}}>
                            <input autoFocus value={commentDraft} onChange={e=>setCommentDraft(e.target.value)}
                              onKeyDown={e=>{if(e.key==="Enter")saveComment(task.key);if(e.key==="Escape")setOpenComment(null);}}
                              placeholder="Note sur cette tâche…"
                              style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"6px 10px",fontSize:12.5,fontFamily:"inherit",color:C.text,outline:"none"}}/>
                            <button onClick={()=>saveComment(task.key)}
                              style={{padding:"6px 12px",borderRadius:7,border:"none",background:C.blue,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>OK</button>
                            {comment&&<button onClick={()=>{const n={...tasksComments,[task.key]:""};setTasksComments(n);onUpdate(row.id,tasksDone,n);setOpenComment(null);}}
                              style={{padding:"6px 10px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>}
                          </div>)}
                      </div>);
                  })}
                </div>
              </div>)}
        </div>
        <div style={{marginTop:20,textAlign:"right"}}>
          <button onClick={onClose} style={{padding:"9px 22px",borderRadius:10,border:"none",background:C.sage,color:"#fff",fontWeight:700,fontSize:14,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>Fermer</button>
        </div>
      </div>
    </div>);
}

function HistoryModal({row,onClose,onUpdateHistory}){
  const [histData,setHistData]=useState([...(row.monthHistory||[])].sort((a,b)=>b.month.localeCompare(a.month)));
  const [sel,setSel]=useState(histData[0]?.month||null);
  const [editMode,setEditMode]=useState(false);
  const [pendingTasks,setPendingTasks]=useState(null);
  const entry=histData.find(h=>h.month===sel)||null;
  const startEdit=()=>{setPendingTasks({...(entry?.tasksDone||{})});setEditMode(true);};
  const cancelEdit=()=>{setEditMode(false);setPendingTasks(null);};
  const confirmEdit=()=>{
    const updated=histData.map(h=>h.month===sel?{...h,tasksDone:{...pendingTasks}}:h);
    setHistData(updated);onUpdateHistory(row.id,updated);setEditMode(false);setPendingTasks(null);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(30,25,20,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:C.card,borderRadius:20,padding:"30px 32px",width:620,maxWidth:"95vw",maxHeight:"88vh",display:"flex",flexDirection:"column",boxShadow:C.shadowLg,animation:"slideUp .22s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:600,fontStyle:"italic"}}>🕓 Historique mensuel</div>
            <div style={{fontSize:13,color:C.muted,marginTop:2,fontWeight:600}}>{row.client}</div>
          </div>
          <button onClick={onClose} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:C.muted,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>

            <span style={{fontSize:11,marginTop:4}}>Il se construira automatiquement à la fin du mois.</span>
          </div>
        ):(
          <div style={{display:"flex",gap:16,flex:1,minHeight:0}}>
            <div style={{display:"flex",flexDirection:"column",gap:4,width:155,flexShrink:0,overflowY:"auto"}}>

                const cs=Object.values(h.tasksDone||{}).filter(Boolean).length;
                const en=ALL_TASKS.filter(t=>row.tasksEnabled?.[t.key]).length;

                    style={{padding:"9px 12px",borderRadius:10,textAlign:"left",cursor:"pointer",fontFamily:"inherit",border:`1.5px solid ${sel===h.month?C.sage:C.border}`,background:sel===h.month?C.sageL:C.bg,color:sel===h.month?C.sageD:C.muted,transition:"all .15s"}}>
                    <div style={{fontSize:13,fontWeight:700}}>{monthKeyToFr(h.month)}</div>
                    <div style={{fontSize:10.5,marginTop:2,color:sel===h.month?C.sage:C.light}}>
                      {done?"✓ Compta OK":h.docsRecu?`${cs}/${en} tâches`:"Docs manquants"}

              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:16}}>

                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {ALL_TASKS.filter(t=>row.tasksEnabled?.[t.key]).map(task=>{
                      const done=editMode?(!!pendingTasks?.[task.key]):(!!entry.tasksDone?.[task.key]);
                      return(
                        <div key={task.key} onClick={editMode?()=>setPendingTasks(p=>({...p,[task.key]:!p[task.key]})):undefined}

                          <span style={{fontSize:15}}>{task.icon}</span>

// Détection de doublon — similarité approximative
const normalize = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim();
const similarity = (a,b) => {
  const na=normalize(a), nb=normalize(b);
  if(!na||!nb) return 0;
  if(na===nb) return 1;
  // Jaccard sur les bigrammes
  const bigrams = s=>{const bg=new Set();for(let i=0;i<s.length-1;i++)bg.add(s[i]+s[i+1]);return bg;};
  const ba=bigrams(na),bb=bigrams(nb);
  const inter=[...ba].filter(x=>bb.has(x)).length;
  return inter/(ba.size+bb.size-inter);
};
const findSimilar = (name, rows, excludeId=null, threshold=0.5) =>
  rows.filter(r=>r.id!==excludeId&&similarity(name,r.client)>=threshold)
      .sort((a,b)=>similarity(name,b.client)-similarity(name,a.client));

function FJPicker({value, onChange}){
  const [open,setOpen]=useState(false);
  const [openUp,setOpenUp]=useState(false);
  const ref=useRef(null);
  const listRef=useRef(null);
  const col=FJ_COLORS[value]||null;

  useEffect(()=>{
    const handler=e=>{
      if(ref.current&&!ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown",handler);
    document.addEventListener("touchstart",handler);
    return()=>{document.removeEventListener("mousedown",handler);document.removeEventListener("touchstart",handler);};
  },[]);

  // Empêche le scroll du modal de fermer la liste
  useEffect(()=>{
    const el=listRef.current;
    if(!el) return;
    const stop=e=>{
      const atTop=el.scrollTop===0&&e.deltaY<0;
      const atBot=el.scrollTop+el.clientHeight>=el.scrollHeight&&e.deltaY>0;
      if(!atTop&&!atBot) e.stopPropagation();
    };
    el.addEventListener("wheel",stop,{passive:true});
    return()=>el.removeEventListener("wheel",stop);
  },[open]);

  const handleOpen=()=>{
    if(!open&&ref.current){
      const rect=ref.current.getBoundingClientRect();
      const spaceBelow=window.innerHeight-rect.bottom;
      setOpenUp(spaceBelow<260);
    }
    setOpen(o=>!o);
  };

  return(
    <div ref={ref} style={{position:"relative"}}>
      <div onClick={handleOpen}
        style={{
          display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"10px 14px",borderRadius:9,cursor:"pointer",
          border:`1.5px solid ${col||C.border}`,
          background:col?col+"0d":C.bg,
          transition:"all .18s",
          boxShadow:open?`0 0 0 3px ${(col||C.sage)}22`:"none"
        }}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {col&&<span style={{width:8,height:8,borderRadius:"50%",background:col,display:"inline-block",flexShrink:0}}/>}
          <span style={{fontSize:14,fontFamily:"inherit",color:col||C.muted,fontWeight:col?700:400}}>
            {value||"— Sélectionner —"}
          </span>
        </div>
        <span style={{fontSize:10,color:C.light,transition:"transform .15s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)"}}>▼</span>
      </div>

      {open&&(
        <div ref={listRef} style={{
          position:"absolute",
          ...(openUp?{bottom:"calc(100% + 6px)"}:{top:"calc(100% + 6px)"}),
          left:0,right:0,zIndex:9999,
          background:C.card,border:`1.5px solid ${C.border}`,borderRadius:12,
          boxShadow:C.shadowLg,overflow:"hidden",animation:"slideUp .14s ease",
          maxHeight:240,overflowY:"auto"
        }}
          onMouseDown={e=>e.stopPropagation()}
          onTouchStart={e=>e.stopPropagation()}
        >
          <div onClick={()=>{onChange("");setOpen(false);}}
            style={{
              padding:"10px 14px",cursor:"pointer",fontSize:13,color:C.light,
              borderBottom:`1px solid ${C.borderL}`,
              background:!value?C.borderL:C.card,
              transition:"background .1s"
            }}>
            — Sélectionner —
          </div>
          <div>
            {FJ_LIST.map((fj,i)=>{
              const c=FJ_COLORS[fj];
              const selected=value===fj;
              return(
                <div key={fj}
                  onClick={()=>{onChange(fj);setOpen(false);}}
                  style={{
                    display:"flex",alignItems:"center",gap:10,
                    padding:"11px 16px",cursor:"pointer",
                    background:selected?c+"15":C.card,
                    borderBottom:i<FJ_LIST.length-1?`1px solid ${C.borderL}`:"none",
                    transition:"background .1s"
                  }}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:c,flexShrink:0,display:"inline-block"}}/>
                  <span style={{fontSize:13,fontWeight:selected?700:600,color:selected?c:C.text,fontFamily:"inherit",flex:1}}>
                    {fj}
                  </span>
                  {selected&&<span style={{fontSize:11,color:c}}>✓</span>}
                </div>);
            })}
          </div>
        </div>)}
    </div>);
}

function CalendarView({rows,refDate}){
  const ref0=new Date(refDate);ref0.setHours(0,0,0,0);
  const [cy,setCy]=useState(ref0.getFullYear());
  const [cm,setCm]=useState(ref0.getMonth());
  const todayD=new Date();todayD.setHours(0,0,0,0);
  const prevMonth=()=>{if(cm===0){setCy(y=>y-1);setCm(11);}else setCm(m=>m-1);};
  const nextMonth=()=>{if(cm===11){setCy(y=>y+1);setCm(0);}else setCm(m=>m+1);};
  const daysInMonth=new Date(cy,cm+1,0).getDate();
  const firstDow=(new Date(cy,cm,1).getDay()+6)%7;
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  const calRef=`${cy}-${String(cm+1).padStart(2,"0")}-01`;
  const dayMap={};
  rows.filter(r=>hasTVA(r)).forEach(row=>{
    const tgt=getNextTVADate(row,calRef);
    if(!tgt||tgt.getFullYear()!==cy||tgt.getMonth()!==cm) return;
    const d=tgt.getDate();
    if(!dayMap[d]) dayMap[d]=[];
    const refD=new Date(refDate);refD.setHours(0,0,0,0);
    dayMap[d].push({row,days:Math.ceil((tgt-refD)/86400000)});
  });
  const regColor={mensuel:C.blue,trimestriel:C.lav};
  return(
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"24px",boxShadow:C.shadow}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <button onClick={prevMonth} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:16,color:C.muted}}>‹</button>
        <div style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:600}}>{MONTHS_FR[cm]} {cy}</div>
        <button onClick={nextMonth} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:16,color:C.muted}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {DAYS_SHORT.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:C.light,textTransform:"uppercase",letterSpacing:.8,padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const isToday=day===todayD.getDate()&&cm===todayD.getMonth()&&cy===todayD.getFullYear();
          const entries=dayMap[day]||[];
          return(
            <div key={day} style={{minHeight:70,borderRadius:10,padding:"6px",background:isToday?"#f0f7f2":entries.length?"#fefefe":C.bg,border:`1.5px solid ${isToday?C.sage:entries.length?C.border:C.borderL}`}}>
              <div style={{fontSize:12,fontWeight:700,color:isToday?C.sage:C.muted,marginBottom:4,textAlign:"right"}}>{day}</div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {entries.map(({row,days})=>(
                  <div key={row.id} title={`${row.client} — ${days>=0?`${days}j restant`:`${Math.abs(days)}j dépassé`}`}
                    style={{fontSize:10,fontWeight:700,padding:"2px 5px",borderRadius:4,lineHeight:1.4,background:(regColor[row.regime]||C.blue)+"22",color:regColor[row.regime]||C.blue,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",border:`1px solid ${(regColor[row.regime]||C.blue)}44`,cursor:"default"}}>
                    {row.client.split(" ")[0]}
                  </div>))}
              </div>
            </div>);
        })}
      </div>
    </div>);
}

function BilanPage({rows,refDate}){
  const [bilans,setBilans]=useState(()=>{
    try{const s=localStorage.getItem("bilans_v1");return s?JSON.parse(s):{};}catch{return {};}
  });
  useEffect(()=>{
    try{localStorage.setItem("bilans_v1",JSON.stringify(bilans));}catch{}
  },[bilans]);

  const updateBilan=(id,patch)=>{
    setBilans(prev=>{
      const cur=prev[id]||{pointsSuspens:"",revueComptes:"",etapes:{},notes:""};
      return {...prev,[id]:{...cur,...patch}};
    });
  };
  const toggleEtape=(id,key)=>{
    setBilans(prev=>{
      const cur=prev[id]||{pointsSuspens:"",revueComptes:"",etapes:{},notes:""};
      const etapes={...cur.etapes,[key]:!cur.etapes?.[key]};
      return {...prev,[id]:{...cur,etapes}};
    });
  };
  const cycleOuiNon=(id,field)=>{
    setBilans(prev=>{
      const cur=prev[id]||{pointsSuspens:"",revueComptes:"",etapes:{},notes:""};
      const vals=["","non","oui"];
      const next=vals[(vals.indexOf(cur[field]||"")+1)%vals.length];
      return {...prev,[id]:{...cur,[field]:next}};
    });
  };

  const regColor=r=>({mensuel:C.blue,trimestriel:C.lav,annuel:C.teal,association:C.purple,acompte:"#d97a1a"})[r]||C.blue;
  const regLabel=r=>({mensuel:"Mensuel",trimestriel:"Trim.",annuel:"Annuel",association:"Asso.",acompte:"Acompte"})[r]||r;
  const fjColor=(fj)=>({ASS:"#8b5cf6",BNC:"#0891b2",EI:"#d97a1a",EURL:"#6a8fb5",IND:"#d97a1a",LMNP:"#5a9b8f",OGEC:"#8b5cf6",SARL:"#6a8fb5",SAS:"#2563eb",SASU:"#2563eb",SC:"#5a9b8f",SCI:"#5a9b8f"})[fj]||C.muted;

  const OuiNonBadge=({value,onClick})=>{
    const cfg={
      oui:{bg:C.sageL,color:C.sageD,border:"#cde0d3",label:"Oui"},
      non:{bg:C.redL,color:C.red,border:"#f0cece",label:"Non"},
      "": {bg:"#f0eeeb",color:C.muted,border:C.border,label:"—"},

    const s=cfg[value||""]||cfg[""];
    return(
      <button onClick={onClick}
        style={{padding:"4px 14px",borderRadius:99,border:`1.5px solid ${s.border}`,

          fontFamily:"inherit",transition:"all .15s",minWidth:52,textAlign:"center"}}>
        {s.label}
      </button>);
  };

  const ProgressBar=({etapes})=>{
    const done=BILAN_ETAPES.filter(e=>etapes?.[e.key]).length;
    const pct=Math.round(done/BILAN_ETAPES.length*100);
    const col=pct===100?C.sage:pct>=50?C.blue:pct>0?C.lav:C.border;
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,minWidth:160}}>
        <div style={{flex:1,background:"#eee",borderRadius:99,height:7,overflow:"hidden"}}>

        </div>
        <span style={{fontSize:11,fontWeight:700,color:col,minWidth:28,textAlign:"right"}}>{pct}%</span>
      </div>);
  };

  const total=rows.length;
  const bilanDone=rows.filter(r=>{const b=bilans[r.id]||{};const done=BILAN_ETAPES.filter(e=>b.etapes?.[e.key]).length;return done===BILAN_ETAPES.length;}).length;

          {[

          ].map(s=>(
            <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"10px 16px",textAlign:"center",minWidth:90,boxShadow:C.shadow}}>

                              </button>);
                          })}
                        </div>
                      </div>
                    </td>
                  </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>);

function PrintRecap({rows,refDate,stats}){
  const tvaUrgent=rows.filter(r=>{const d=daysUntilNext(r,refDate);return d!==null&&d<=7;});
  const noDoc=rows.filter(r=>!r.docsRecu);
  const done=rows.filter(r=>getRowStatus(r,refDate)==="done");
  const inProgress=rows.filter(r=>getComptaStatus(r)==="progress");
  const [y,m,d]=refDate.split("-");

  const comptableFr=`${MONTHS_FR[dc.getMonth()]} ${dc.getFullYear()}`;

    <div className="print-recap" style={{display:"none",fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"2px solid #6d9b78",paddingBottom:8,marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:5,height:36,background:"#6d9b78",borderRadius:3,flexShrink:0}}/>
          <div>
            <div style={{fontFamily:"'Lora',serif",fontSize:16,fontWeight:600,color:"#28251f",lineHeight:1.2}}>Feuille de route — Suivi comptable</div>
            <div style={{fontSize:9,color:"#9e978d",marginTop:2,fontWeight:600,letterSpacing:.3}}>
              Travail sur : <strong style={{color:"#28251f"}}>{comptableFr}</strong>
              &nbsp;·&nbsp;Référence : <strong style={{color:"#28251f"}}>{d}/{m}/{y}</strong>
              &nbsp;·&nbsp;Imprimé le {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}
            </div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,minWidth:160}}>
          <div style={{fontSize:9,color:"#9e978d",fontWeight:700,letterSpacing:.4,textTransform:"uppercase"}}>Avancement global</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:120,height:7,background:"#e8e3dc",borderRadius:99,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:"#6d9b78",borderRadius:99}}/>
            </div>
            <span style={{fontSize:11,fontWeight:700,color:"#6d9b78",minWidth:30,textAlign:"right"}}>{pct}%</span>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:0,marginBottom:8,border:"1px solid #e8e3dc",borderRadius:6,overflow:"hidden"}}>
        {[
          {val:rows.length,    label:"Dossiers",        color:"#28251f", bg:"#ffffff"},
          {val:done.length,    label:"Terminés",        color:"#4e7859", bg:"#edf4ef"},
          {val:inProgress.length,label:"En cours",      color:"#7a6aa0", bg:"#f3f0f9"},
          {val:noDoc.length,   label:"Docs manquants",  color:noDoc.length>0?"#b86b3a":"#9e978d", bg:noDoc.length>0?"#fdf1eb":C.borderL},
          {val:tvaUrgent.length,label:"TVA ≤ 7 jours", color:tvaUrgent.length>0?"#a84f4f":"#9e978d", bg:tvaUrgent.length>0?"#fceaea":C.borderL},
        ].map((s,i,arr)=>(
          <div key={s.label} style={{flex:1,padding:"7px 10px",background:s.bg,borderRight:i<arr.length-1?"1px solid #e8e3dc":"none",textAlign:"center"}}>
            <div style={{fontSize:18,fontWeight:700,fontFamily:"'Lora',serif",color:s.color,lineHeight:1}}>{s.val}</div>
            <div style={{fontSize:8,fontWeight:700,color:"#9e978d",marginTop:3,textTransform:"uppercase",letterSpacing:.5}}>{s.label}</div>
          </div>
        ))}
      </div>
      {(tvaUrgent.length>0||noDoc.length>0)&&(
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          {tvaUrgent.length>0&&(
            <div style={{flex:1,padding:"5px 9px",background:"#fceaea",border:"1px solid #e8b4b4",borderRadius:4,fontSize:8,color:"#a84f4f",fontWeight:700,minWidth:0}}>
              <span style={{marginRight:4}}>⚠</span>TVA urgentes :&nbsp;
              <span style={{fontWeight:400}}>{tvaUrgent.map(r=>{
                const d=daysUntilNext(r,refDate);
                const tgt=getNextTVADate(r,refDate);
                const ds=tgt?` (${String(tgt.getDate()).padStart(2,"0")}/${String(tgt.getMonth()+1).padStart(2,"0")})`:"";
                return `${r.client}${ds}`;
              }).join("  ·  ")}</span>
            </div>)}
          {noDoc.length>0&&(
            <div style={{flex:1,padding:"5px 9px",background:"#fdf1eb",border:"1px solid #e8c4a0",borderRadius:4,fontSize:8,color:"#b86b3a",fontWeight:700,minWidth:0}}>
              <span style={{marginRight:4}}>○</span>Docs manquants :&nbsp;
              <span style={{fontWeight:400}}>{noDoc.map(r=>r.client).join("  ·  ")}</span>
            </div>)}
        </div>)}
    </div>);
}

function HistoryCell({row, onOpen}){
  const [hover,setHover]=useState(false);
  const [pos,setPos]=useState({top:0,left:0});
  const btnRef=useRef(null);

  const hist=row.monthHistory||[];
  const histCount=hist.length;

  const taskAlerts=useMemo(()=>{
    const enabled=row.tasksEnabled||{};
    const sortedHist=[...hist].sort((a,b)=>b.month.localeCompare(a.month));
    const result={};
    ALL_TASKS.filter(t=>enabled[t.key]).forEach(t=>{
      let count=0;
      for(const h of sortedHist){
        if(!(h.tasksDone||{})[t.key]) count++;
        else break;
      }
      if(count>0){
        const oldest=sortedHist[count-1]?.month;
        result[t.key]={task:t,count,oldest};
      }
    });
    return Object.values(result).sort((a,b)=>b.count-a.count);
  },[hist,row.tasksEnabled]);

  const hasAlert=taskAlerts.length>0;

  const showTip=e=>{
    if(!hasAlert) return;
    const r=btnRef.current?.getBoundingClientRect();
    if(r) setPos({top:r.bottom+window.scrollY+6,left:r.left+window.scrollX+r.width/2});
    setHover(true);
  };

  const fmtMonth=m=>{
    const [y,mo]=m.split("-");
    return `${MONTHS_FR[parseInt(mo)-1]} ${y}`;
  };

  const tip=hover&&hasAlert&&ReactDOM.createPortal(
    <div style={{
      position:"absolute",top:pos.top,left:pos.left,transform:"translateX(-50%)",
      zIndex:9999,background:C.card,borderRadius:12,
      boxShadow:C.shadowLg+",0 0 0 1px "+C.border,
      padding:"13px 15px 11px",minWidth:230,maxWidth:300,
      fontFamily:"'DM Sans',sans-serif",
      animation:"slideUp .14s ease",
      pointerEvents:"none"}}>
      <div style={{fontSize:8.5,color:C.light,letterSpacing:1.4,textTransform:"uppercase",marginBottom:10}}>
        Tâches en retard · {taskAlerts.length} concernée{taskAlerts.length>1?"s":""}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {taskAlerts.map(({task,count,oldest})=>(
          <div key={task.key} style={{
            display:"flex",alignItems:"center",justifyContent:"space-between",
            gap:10,padding:"6px 9px",borderRadius:8,
            background:"#fdf4f4",border:"1px solid #f0d0d0"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}>
              <span style={{fontSize:13,lineHeight:1}}>{task.icon}</span>
              <span style={{fontSize:11.5,color:"#8a3838"}}>{task.label}</span>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:11,color:"#c07070",lineHeight:1.3}}>{count} mois</div>
              <div style={{fontSize:9,color:C.light,lineHeight:1.3}}>depuis {fmtMonth(oldest)}</div>
            </div>
          </div>))}
      </div>
    </div>,document.body);

  return(
    <td style={{padding:"8px 8px",textAlign:"center"}}>
      <button ref={btnRef}
        onClick={()=>onOpen(row)}
        onMouseEnter={showTip}
        onMouseLeave={()=>setHover(false)}
        title={!hasAlert&&histCount>0?`${histCount} mois archivé${histCount>1?"s":""}`:""}
        style={{
          padding:"4px 9px",borderRadius:7,cursor:"pointer",
          fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:5,
          whiteSpace:"nowrap",transition:"all .15s",
          border:hasAlert?`1px solid #f0cece`:`1px solid ${histCount>0?C.border:C.borderL}`,
          background:hasAlert?"#fdf4f4":histCount>0?C.borderL:C.bg,
          color:hasAlert?"#b05050":histCount>0?C.muted:C.light,
          fontSize:11.5,fontWeight:histCount>0?500:400}}>
        {hasAlert&&<span style={{width:6,height:6,borderRadius:"50%",background:"#d47a7a",flexShrink:0,display:"inline-block"}}/>}
        {histCount>0?`${histCount} mois`:"—"}
        {hasAlert&&<span style={{fontSize:9.5,color:"#c07070",marginLeft:1}}>
          {taskAlerts.length} retard{taskAlerts.length>1?"s":""}
        </span>}
      </button>
      {tip}
    </td>);
}

function TVAJoursHeader({tvaJoursFilter,setTvaJoursFilter,rows,refDate,sortBy,sortDir,setSortBy,setSortDir}){
  const [open,setOpen]=useState(false);
  const [pos,setPos]=useState({top:0,left:0});
  const btnRef=useRef(null);

  const refMonth=parseInt((refDate||"").split("-")[1])||new Date().getMonth()+1;
  const isTrimMonth=TVA_QUARTERS.includes(refMonth);

  const availableDays=useMemo(()=>{
    const days=new Set();
    rows.forEach(r=>{
      if(!hasTVA(r)||!r.tvaDayOfMonth) return;
      const reg=r.regime||"mensuel";
      if(reg==="trimestriel"&&!isTrimMonth) return;
      days.add(parseInt(r.tvaDayOfMonth));
    });
    return [...days].sort((a,b)=>a-b);
  },[rows,isTrimMonth]);

  const sansTVACount=useMemo(()=>rows.filter(r=>!hasTVA(r)).length,[rows]);

  const toggle=()=>{
    if(!open&&btnRef.current){
      const r=btnRef.current.getBoundingClientRect();
      setPos({top:r.bottom+window.scrollY+4,left:r.left+window.scrollX+r.width/2});
    }
    setOpen(o=>!o);
  };

  useEffect(()=>{
    if(!open) return;
    const handler=e=>{
      if(btnRef.current&&btnRef.current.contains(e.target)) return;
      const menu=document.getElementById("tva-jours-menu");
      if(menu&&menu.contains(e.target)) return;
      setOpen(false);
    };
    document.addEventListener("mousedown",handler);
    return()=>document.removeEventListener("mousedown",handler);
  },[open]);

  const toggleDay=day=>{
    setTvaJoursFilter(prev=>{
      const next=prev.includes(day)?prev.filter(d=>d!==day):[...prev,day];
      if(next.length>0){setSortBy("jours");setSortDir("asc");}
      return next;
    });
  };

  const active=tvaJoursFilter.length>0;
  const countForDay=day=>rows.filter(r=>{
    if(day==="sans-tva") return !hasTVA(r);
    return hasTVA(r)&&parseInt(r.tvaDayOfMonth)===day;
  }).length;

  const matchedCount=rows.filter(r=>{
    if(tvaJoursFilter.includes("sans-tva")&&!hasTVA(r)) return true;
    return hasTVA(r)&&tvaJoursFilter.includes(parseInt(r.tvaDayOfMonth));
  }).length;
  const sortedSel=tvaJoursFilter.slice().sort((a,b)=>a-b);

  const PAL=[
    {dot:C.sage,   bg:C.sageL,   text:C.sageD,   border:"#c4deca"},
    {dot:C.blue,   bg:C.blueL,   text:"#3a5878",  border:"#bdd0e8"},
    {dot:C.amber,  bg:C.amberL,  text:"#7a5f0a",  border:"#e0ca80"},
    {dot:C.lav,    bg:C.lavL,    text:"#5c3e7a",  border:"#d0bee8"},
    {dot:C.teal,   bg:C.tealL,   text:"#2d6058",  border:"#b0d8d4"},
    {dot:C.orange, bg:C.orangeL, text:"#7a4020",  border:"#e8c0a0"},
  ];
  const pal=(idx)=>PAL[idx%PAL.length];

  const menu=open&&ReactDOM.createPortal(
    <div id="tva-jours-menu" onClick={e=>e.stopPropagation()} style={{
      position:"absolute",top:pos.top,left:pos.left,transform:"translateX(-50%)",
      zIndex:9999,
      background:C.card,
      borderRadius:14,
      boxShadow:C.shadowLg+",0 0 0 1px "+C.border,
      padding:"14px 12px 11px",
      minWidth:210,
      animation:"slideUp .16s cubic-bezier(.16,1,.3,1)",
      fontFamily:"'DM Sans',sans-serif"}}>
      <div style={{fontSize:8.5,color:C.light,letterSpacing:1.5,textTransform:"uppercase",marginBottom:10,paddingLeft:2,textAlign:"center",fontWeight:600}}>
        Jour d'échéance TVA
      </div>
      {availableDays.length===0
        ? <div style={{fontSize:11,color:C.light,padding:"6px 2px"}}>Aucun jour défini</div>
        : <div style={{display:"flex",flexDirection:"column",gap:1}}>
            {availableDays.map((day,idx)=>{
              const sel=tvaJoursFilter.includes(day);
              const cnt=countForDay(day);
              const p=pal(idx);
              return(
                <button key={day} onClick={()=>toggleDay(day)}
                  style={{
                    display:"flex",alignItems:"center",justifyContent:"space-between",
                    gap:16,padding:"8px 10px",borderRadius:9,
                    border:sel?`1px solid ${p.border}`:`1px solid transparent`,
                    background:sel?p.bg:"transparent",
                    cursor:"pointer",fontFamily:"inherit",
                    transition:"all .13s",width:"100%",outline:"none"}}
                  onMouseEnter={e=>{if(!sel){e.currentTarget.style.background=p.bg+"99";e.currentTarget.style.borderColor=p.border+"88";}}}
                  onMouseLeave={e=>{if(!sel){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="transparent";}}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:p.dot,opacity:sel?1:0.75,transition:"opacity .13s"}}/>
                    <span style={{fontFamily:"'Lora',serif",fontSize:14,lineHeight:1,color:sel?p.text:p.dot,opacity:sel?1:0.85,letterSpacing:.3,transition:"all .13s"}}>
                      {String(day).padStart(2,"0")}
                    </span>
                    <span style={{fontSize:10,color:C.light,opacity:sel?1:0.8,fontWeight:600}}>du mois</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:10,color:sel?p.dot:C.muted,opacity:sel?1:0.8,fontWeight:600}}>
                      {cnt} dossier{cnt!==1?"s":""}
                    </span>
                    {sel&&(
                      <div style={{width:15,height:15,borderRadius:"50%",background:p.dot,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",lineHeight:1}}>✓</div>)}
                  </div>
                </button>);
            })}
          </div>}
      {sansTVACount>0&&(
        <div style={{marginTop:6,paddingTop:6,borderTop:`1px solid ${C.borderL}`}}>
          {(()=>{
            const sel=tvaJoursFilter.includes("sans-tva");
            return(
              <button onClick={()=>toggleDay("sans-tva")}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,padding:"8px 10px",borderRadius:9,border:sel?`1px solid ${C.border}`:`1px solid transparent`,background:sel?"#f4f2ef":"transparent",cursor:"pointer",fontFamily:"inherit",transition:"all .13s",width:"100%",outline:"none"}}
                onMouseEnter={e=>{if(!sel){e.currentTarget.style.background=C.bg;e.currentTarget.style.borderColor=C.borderL;}}}
                onMouseLeave={e=>{if(!sel){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="transparent";}}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:C.light,opacity:sel?1:0.75,transition:"opacity .13s"}}/>
                  <span style={{fontFamily:"'Lora',serif",fontSize:14,lineHeight:1,color:C.muted,opacity:sel?1:0.85,letterSpacing:.3,fontStyle:"italic"}}>Sans TVA</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:10,color:sel?C.muted:C.light,opacity:sel?1:0.8,fontWeight:600}}>{sansTVACount} dossier{sansTVACount!==1?"s":""}</span>
                  {sel&&(<div style={{width:15,height:15,borderRadius:"50%",background:C.muted,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",lineHeight:1}}>✓</div>)}
                </div>
              </button>);
          })()}
        </div>)}
      {active&&(
      <div style={{marginTop:10,paddingTop:9,borderTop:`1px solid ${C.borderL}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
          {sortedSel.map((d,i)=>{
            if(d==="sans-tva") return(
              <span key="sans-tva" style={{fontFamily:"'Lora',serif",fontStyle:"italic",fontSize:11,color:C.muted,background:C.bg,border:`1px solid ${C.border}`,borderRadius:99,padding:"2px 9px",lineHeight:1.6}}>Sans TVA</span>);
            const idx=availableDays.indexOf(d);
            const p=pal(idx>=0?idx:i);
            return(<span key={d} style={{fontFamily:"'Lora',serif",fontSize:11,color:p.text,background:p.bg,border:`1px solid ${p.border}`,borderRadius:99,padding:"2px 9px",lineHeight:1.6}}>{String(d).padStart(2,"0")}</span>);
          })}
          <span style={{fontSize:9.5,color:C.light}}>· {matchedCount} dossier{matchedCount!==1?"s":""}</span>
        </div>
        <button onClick={()=>{setTvaJoursFilter([]);setOpen(false);}}
          style={{flexShrink:0,padding:"3px 10px",borderRadius:99,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",fontFamily:"inherit",fontSize:9.5,color:C.muted,transition:"all .12s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.red+"66";e.currentTarget.style.color=C.red;e.currentTarget.style.background=C.redL;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;e.currentTarget.style.background="transparent";}}>
          effacer
        </button>
      </div>)}
    </div>,
    document.body
  );

  return(
    <th style={{padding:"11px 12px",textAlign:"center",fontSize:10.5,fontWeight:700,color:active?C.sageD:C.light,letterSpacing:1,textTransform:"uppercase",cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",position:"relative"}}>
      <div ref={btnRef} onClick={toggle}
        style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 8px",borderRadius:7,transition:"all .13s",background:active?C.sageL:"transparent",border:active?`1px solid #c4deca`:`1px solid transparent`}}
        onMouseEnter={e=>{if(!active){e.currentTarget.style.background=C.bg;e.currentTarget.style.borderColor=C.border;}}}
        onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="transparent";}}}>
        <span style={{fontSize:10,letterSpacing:.8}}>Prochain TVA</span>
        {sortBy==="jours"&&<span style={{fontSize:9,opacity:.5}}>{sortDir==="asc"?"↑":"↓"}</span>}
        {active
          ? <div style={{display:"flex",gap:3}}>
              {sortedSel.map((d,i)=>{
                const idx=availableDays.indexOf(d);
                const p=pal(idx>=0?idx:i);
                return <span key={d} style={{fontFamily:"'Lora',serif",fontSize:10,color:p.text,background:p.bg,border:`1px solid ${p.border}`,borderRadius:99,padding:"1px 7px",lineHeight:1.5}}>{String(d).padStart(2,"0")}</span>;
              })}
            </div>
          : <span style={{fontSize:9,opacity:.35}}>▾</span>}
      </div>
      {menu}
    </th>);
}

function CommandPalette({rows,open,onClose,query,setQuery,setFilter,setPage,openAdd,setSearch,setComptaRow,setReviewMode}){

  if(!open) return null;
  const cmds=[
    {label:"➕ Nouveau dossier",             keys:"N",          action:()=>{openAdd();onClose();}},
    {label:"🔍 Rechercher",                   keys:"/",          action:()=>{document.querySelector("input[placeholder*='client']")?.focus();onClose();}},
    {label:"📋 Tous les dossiers",            keys:"",           action:()=>{setFilter("all");onClose();}},
    {label:"⏳ Filtrer : En cours",           keys:"",           action:()=>{setFilter("progress");onClose();}},
    {label:"✅ Filtrer : Terminés",           keys:"",           action:()=>{setFilter("done");onClose();}},
    {label:"📅 Filtrer : En suspens",         keys:"",           action:()=>{setFilter("suspens");onClose();}},
    {label:"📂 Filtrer : Sans docs",          keys:"",           action:()=>{setFilter("noDoc");onClose();}},
    {label:"🖥️ Mode Revue de dossier",        keys:"",           action:()=>{setReviewMode(true);onClose();}},
    {label:"📊 Bilan",                        keys:"",           action:()=>{setPage("bilan");onClose();}},

    {label:"🖨️ Imprimer",                    keys:"",           action:()=>{window.print();onClose();}},

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:10000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"15vh",backdropFilter:"blur(4px)"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>

              onMouseEnter={e=>e.currentTarget.style.background=C.bg}

function App(){
  // ── Démarrage : on affiche un écran de chargement le temps que Firebase réponde
  const [fbLoaded, setFbLoaded] = useState(false);
  const [rows,setRows]=useState(()=>{
    // Ne charger le localStorage qu'en fallback si Firebase ne répond pas
    const s=lsLoad();const curM=getCurrentMonthKey();
    if(!s) return SAMPLE_DATA;
    if(s.lastResetMonth&&s.lastResetMonth!==curM) return applyMonthlyReset(s.rows,s.lastResetMonth);
    return s.rows;
  });
  const [nextId,setNextId]=useState(()=>{const d=lsLoad();return d?d.nextId:SAMPLE_DATA.length+1;});
  const [refDate,setRefDate]=useState(()=>todayStr());
  const [syncStatus,setSyncStatus]=useState("none"); // none | syncing | synced | error | no-file
  const [fsHandle,setFsHandle]=useState(null);
  const [darkMode,setDarkMode]=useState(()=>localStorage.getItem("compta_theme")==="dark");
  const toggleTheme=()=>{
    const next=darkMode?"light":"dark";
    localStorage.setItem("compta_theme",next);
    C=THEMES[next];
    setDarkMode(!darkMode);
  };
  React.useEffect(()=>{
    document.body.style.background=C.bg;
    document.body.style.color=C.text;
    document.body.style.transition="background .3s, color .3s";
  },[darkMode]);

  React.useEffect(()=>{
    const isOpen=modal==="add"||modal==="edit";
    if(isOpen){
      document.documentElement.classList.add("modal-open");
      return()=>document.documentElement.classList.remove("modal-open");
    }
  },[modal]);

  // ── États archivage & récap ──
  const [showArchives,setShowArchives]=useState(false);
  const [showSuspens,setShowSuspens]=useState(false);
  const [showRecap,setShowRecap]=useState(false);
  const [recapHistory,setRecapHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("compta_recap_history")||"[]");}catch{return [];}});
  const [recapDismissedToday,setRecapDismissedToday]=useState(()=>localStorage.getItem("compta_recap_dismissed")===todayStr());

  // ── Badge onglet : TVA urgentes ──
  useEffect(()=>{
    const urgent=rows.filter(r=>{const d=daysUntilNext(r,refDate);return d!==null&&d<=0&&!r.archived;}).length;
    document.title=urgent>0?`(${urgent}) Suivi Comptable — Cabinet`:"Suivi Comptable — Cabinet";
    return()=>{document.title="Suivi Comptable — Cabinet";};
  },[rows,refDate]);

  // ── Firebase : synchronisation multi-appareils ────────────────────────────
  useEffect(()=>{
    if(!window.__fb) { setFbLoaded(true); return; }
    // Écouter les changements en temps réel
    const unsub = fbSubscribe((data)=>{
      setFbLoaded(true); // Firebase a répondu — on peut afficher l'app
      if(!data) return;
      const curM = getCurrentMonthKey();
      if(data.lastResetMonth && data.lastResetMonth !== curM){
        setRows(applyMonthlyReset(data.rows, data.lastResetMonth));
      } else if(data.rows) {
        setRows(data.rows);
      }
      if(data.nextId) setNextId(data.nextId);
      lsSave(data);
    });
    // Timeout de sécurité : si Firebase ne répond pas en 5s, afficher quand même
    const timeout = setTimeout(() => setFbLoaded(true), 5000);
    return () => { unsub(); clearTimeout(timeout); };
  },[]);

  // ── Récap fin de journée (après 16h50) ──
  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const h=now.getHours(),m=now.getMinutes();
      const after1650=(h>16)||(h===16&&m>=50);
      const dismissed=localStorage.getItem("compta_recap_dismissed")===todayStr();
      if(after1650&&!dismissed) setShowRecap(true);
    };
    check(); // vérif immédiate au chargement
    const iv=setInterval(check,60000);
    return()=>clearInterval(iv);
  },[]);

  const buildRecap=()=>{
    const today=todayStr();
    const todayLogs=activityLog.filter(e=>{
      const d=new Date(e.time);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`===today;
    });
    const validated=todayLogs.filter(e=>e.msg.includes("tâches mises à jour")||e.msg.includes("terminés")||e.msg.includes("dossier modifié")).length;
    const tva=todayLogs.filter(e=>e.msg.includes("TVA")).length;
    const relances=todayLogs.filter(e=>e.msg.includes("relance")||e.msg.includes("Relance")).length;
    const docs=todayLogs.filter(e=>e.msg.includes("docs reçus")||e.msg.includes("docs")).length;
    const actions=todayLogs.length;
    return{date:today,actions,validated,tva,relances,docs,logs:todayLogs.map(e=>({msg:e.msg,time:e.time.toISOString()}))};
  };
  const dismissRecap=(save)=>{
    if(save){
      const recap=buildRecap();
      const hist=[recap,...recapHistory.filter(r=>r.date!==recap.date).slice(0,29)];
      setRecapHistory(hist);
      try{localStorage.setItem("compta_recap_history",JSON.stringify(hist));}catch{}
    }
    localStorage.setItem("compta_recap_dismissed",todayStr());
    setRecapDismissedToday(true);
    setShowRecap(false);
  };
  const fsHandleRef=useRef(null);
  const syncRef=useRef(null);

  // Charge le handle stocké au démarrage et lit le fichier
  useEffect(()=>{
    (async()=>{
      if(!window.__fsSupported){ setSyncStatus("no-file"); return; }
      const h = await getStoredHandle();
      if(!h){ setSyncStatus("no-file"); return; }
      // Vérifie la permission
      let perm = await h.queryPermission({mode:"readwrite"});
      if(perm==="prompt") perm = await h.requestPermission({mode:"readwrite"});
      if(perm!=="granted"){ setSyncStatus("no-file"); return; }
      fsHandleRef.current = h;
      setFsHandle(h);
      setSyncStatus("syncing");
      const data = await fsRead(h);
      if(data&&data.rows){
        const curM=getCurrentMonthKey();
        if(data.lastResetMonth&&data.lastResetMonth!==curM){
          setRows(applyMonthlyReset(data.rows,data.lastResetMonth));
        }else{ setRows(data.rows); }
        if(data.nextId) setNextId(data.nextId);
        lsSave(data);
      }
      setSyncStatus("synced");
    })();
  },[]);

  // Sauvegarde automatique à chaque changement (local + Firebase)
  useEffect(()=>{
    const data={rows,nextId,lastResetMonth:getCurrentMonthKey()};
    lsSave(data);
    // Sync Firebase (multi-appareils)
    clearTimeout(syncRef.current);
    syncRef.current=setTimeout(async()=>{
      setSyncStatus("syncing");
      await fbSave(data);
      if(fsHandleRef.current){
        const ok = await fsWrite(fsHandleRef.current, data);
        setSyncStatus(ok?"synced":"error");
      } else {
        setSyncStatus("synced");
      }
    },800);
  },[rows,nextId,refDate]);

  // Connecter / changer de fichier
  const connectFile = async (createNew=false) => {
    const h = createNew ? await fsNewFile() : await fsPickFile();
    if(!h) return;
    await storeHandle(h);
    fsHandleRef.current = h;
    setFsHandle(h);
    setSyncStatus("syncing");
    if(!createNew){
      const data = await fsRead(h);
      if(data&&data.rows){
        const curM=getCurrentMonthKey();
        if(data.lastResetMonth&&data.lastResetMonth!==curM){
          setRows(applyMonthlyReset(data.rows,data.lastResetMonth));
        }else{ setRows(data.rows); }
        if(data.nextId) setNextId(data.nextId);
        lsSave(data);
        setSyncStatus("synced"); return;
      }
    }
    // Nouveau fichier : écrit l'état actuel
    const data={rows,nextId,lastResetMonth:getCurrentMonthKey()};
    const ok = await fsWrite(h, data);
    setSyncStatus(ok?"synced":"error");
  };

  const disconnectFile = async () => {
    await clearStoredHandle();
    fsHandleRef.current = null;
    setFsHandle(null);
    setSyncStatus("no-file");
  };

  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [view,setView]=useState("table");
  const [page,setPage]=useState("comptable");
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState(EMPTY_FORM());
  const [comptaRow,setComptaRow]=useState(null);
  const [relancesRow,setRelancesRow]=useState(null);
  const [historyRow,setHistoryRow]=useState(null);
  const [deleteId,setDeleteId]=useState(null);
  const [snoozeId,setSnoozeId]=useState(null);
  const [snoozeCollapsed,setSnoozeCollapsed]=useState(false);
  const [sortBy,setSortBy]=useState("client");
  const [sortDir,setSortDir]=useState("asc");
  const [regimeFilters,setRegimeFilters]=useState([]);
  // ── Nouvelles fonctionnalités ──
  const [undoStack,setUndoStack]=useState([]);
  const [activityLog,setActivityLog]=useState([]);
  const [showLog,setShowLog]=useState(false);
  const [reviewMode,setReviewMode]=useState(false);
  const [reviewIdx,setReviewIdx]=useState(0);
  const [cmdOpen,setCmdOpen]=useState(false);
  const [cmdQuery,setCmdQuery]=useState("");
  const [selectedRowIdx,setSelectedRowIdx]=useState(null);
  const tableRef=useRef(null);

  // Wrapper setRows qui empile l'historique et log
  const setRowsWithHistory=(updater,logMsg)=>{
    setRows(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      setUndoStack(s=>[...s.slice(-19),prev]);
      if(logMsg) setActivityLog(l=>[{msg:logMsg,time:new Date()},...l.slice(0,99)]);
      return next;
    });
  };
  const undoAction=()=>{
    if(undoStack.length===0){showToast("Rien à annuler",C.muted);return;}
    setUndoStack(s=>{
      const prev=[...s];
      const last=prev.pop();
      setRows(last);
      showToast("↩ Action annulée",C.amber);
      return prev;
    });
  };
  const toggleRegime=key=>setRegimeFilters(prev=>prev.includes(key)?prev.filter(k=>k!==key):[...prev,key]);
  const [tvaJoursFilter,setTvaJoursFilter]=useState([]);

  useEffect(()=>{
    const onKey=e=>{
      if(e.key!=="Escape") return;
      if(deleteId!==null){setDeleteId(null);return;}
      if(snoozeId!==null){setSnoozeId(null);return;}
      if(comptaRow){setComptaRow(null);return;}
      if(relancesRow){setRelancesRow(null);return;}
      if(historyRow){setHistoryRow(null);return;}
      if(modal){closeModal();return;}
    };
    document.addEventListener("keydown",onKey);
    return()=>document.removeEventListener("keydown",onKey);
  },[deleteId,comptaRow,relancesRow,historyRow,modal]);

  // Désélection au clic en dehors du tableau
  useEffect(()=>{
    const onClick=e=>{
      if(!tableRef.current) return;
      if(!tableRef.current.contains(e.target)) setSelectedRowIdx(null);
    };
    document.addEventListener("mousedown",onClick);
    return()=>document.removeEventListener("mousedown",onClick);
  },[]);

  const searchRef=useRef(null);
  useEffect(()=>{
    const onKey=e=>{
      const inInput=document.activeElement.tagName==="INPUT"||document.activeElement.tagName==="TEXTAREA";
      // Ctrl+Z — undo
      if((e.ctrlKey||e.metaKey)&&e.key==="z"&&!inInput){e.preventDefault();undoAction();return;}
      // Ctrl+K — command palette
      if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setCmdOpen(o=>!o);setCmdQuery("");return;}
      if(inInput) return;
      if(e.key==="/"){e.preventDefault();searchRef.current?.focus();}
      if(e.key==="n"||e.key==="N"){e.preventDefault();openAdd();}
      // Arrow navigation in table
      if(e.key==="ArrowDown"||e.key==="ArrowUp"){
        e.preventDefault();
        setSelectedRowIdx(i=>{
          const len=filteredRef.current?.length||0;
          if(len===0) return null;
          if(i===null) return 0;
          return e.key==="ArrowDown"?Math.min(i+1,len-1):Math.max(i-1,0);
        });
      }
      if(e.key==="Enter"&&selectedRowIdx!==null){
        const row=filteredRef.current?.[selectedRowIdx];
        if(row) setComptaRow(row);
      }
      if(e.key===" "&&selectedRowIdx!==null){
        e.preventDefault();
        const row=filteredRef.current?.[selectedRowIdx];
        if(row) toggleDocs(row.id);
      }
    };
    document.addEventListener("keydown",onKey);
    return()=>document.removeEventListener("keydown",onKey);
  },[undoStack,selectedRowIdx,undoAction,toggleDocs]);

  const [toast,setToast]=useState(null);
  const showToast=(msg,color=C.sage)=>{setToast({msg,color});setTimeout(()=>setToast(null),2500);};

  const openAdd=()=>{setForm(EMPTY_FORM());setModal("add");};
  const openEdit=row=>{setForm({...row,tasksEnabled:{...row.tasksEnabled},tasksDone:{...row.tasksDone}});setModal("edit");};
  const closeModal=()=>setModal(null);
  const handleSave=()=>{
    if(!form.client.trim()) return;
    if(modal==="add"){
      setRowsWithHistory(r=>[...r,{...form,id:nextId,monthHistory:[]}],`➕ ${form.client} — dossier créé`);
      setNextId(n=>n+1);showToast("✓ Dossier ajouté");
    } else {
      setRowsWithHistory(r=>r.map(row=>row.id===form.id?{...form,monthHistory:row.monthHistory||[]}:row),`✏️ ${form.client} — dossier modifié`);
      showToast("✓ Dossier modifié");
    }
    closeModal();
  };
  const filteredRef=useRef([]);
  const handleDelete=()=>{
    const name=rows.find(r=>r.id===deleteId)?.client||"Dossier";
    setRowsWithHistory(r=>r.filter(row=>row.id!==deleteId),`🗑️ ${name} — supprimé`);
    setDeleteId(null);showToast("Dossier supprimé",C.red);
  };
  const archiveRow=(id)=>{
    const name=rows.find(r=>r.id===id)?.client||"Dossier";
    setRowsWithHistory(r=>r.map(row=>row.id===id?{...row,archived:true,archivedAt:todayStr()}:row),`📦 ${name} — archivé`);
    showToast(`📦 ${name} archivé`,C.muted);
  };
  const unarchiveRow=(id)=>{
    const name=rows.find(r=>r.id===id)?.client||"Dossier";
    setRowsWithHistory(r=>r.map(row=>row.id===id?{...row,archived:false,archivedAt:null}:row),`📤 ${name} — désarchivé`);
    showToast(`📤 ${name} désarchivé`,C.sage);
  };
  const applySnooze=(id,date)=>{
    const name=rows.find(r=>r.id===id)?.client||"Dossier";
    setRowsWithHistory(r=>r.map(row=>row.id===id?{...row,snoozeUntil:date}:row), date?`⏳ ${name} — en suspens jusqu'au ${fmtDate(date)}`:`☀️ ${name} — snooze annulé`);
    setSnoozeId(null);showToast(date?`😴 Snoozé jusqu'au ${fmtDate(date)}`:"Snooze annulé",C.amber);
  };
  const toggleDocs=id=>{
    const row=rows.find(r=>r.id===id);
    const name=row?.client||"Dossier";
    setRowsWithHistory(r=>r.map(row=>{
      if(row.id!==id) return row;
      showToast(row.docsRecu?"Documents : en attente":"✓ Documents reçus");
      return {...row,docsRecu:!row.docsRecu};
    }), `${row?.docsRecu?"📭":"📬"} ${name} — docs ${row?.docsRecu?"en attente":"reçus"}`);
  };
  const updateTasksDone=(id,td,tc)=>{
    const name=rows.find(r=>r.id===id)?.client||"Dossier";
    setRowsWithHistory(r=>r.map(row=>row.id===id?{...row,tasksDone:td,...(tc!==undefined?{tasksComments:tc}:{})}:row),`✏️ ${name} — tâches mises à jour`);
  };
  const updateRelances=(id,rel)=>setRows(r=>r.map(row=>row.id===id?{...row,relances:rel}:row));
  const updateHistory=(id,hist)=>setRows(r=>r.map(row=>row.id===id?{...row,monthHistory:hist}:row));
  const updateNote=(id,note)=>{
    const name=rows.find(r=>r.id===id)?.client||"Dossier";
    setRowsWithHistory(r=>r.map(row=>row.id===id?{...row,notes:note}:row),`📝 ${name} — note modifiée`);
  };
  const updateNoteMois=(id,note)=>{
    setRowsWithHistory(r=>r.map(row=>row.id===id?{...row,notesMois:note}:row),`📅 ${rows.find(r=>r.id===id)?.client||""} — note du mois modifiée`);
  };
  const updateTvaStatut=(id,val)=>{
    const name=rows.find(r=>r.id===id)?.client||"Dossier";
    setRowsWithHistory(r=>r.map(row=>row.id===id?{...row,tvaStatut:val}:row),`📊 ${name} — TVA: ${TVA_STATUS_LABEL[val]||val}`);
  };

  const FILTER_GROUPS=[
    {label:"Statut", filters:[
      {key:"all",        label:"Tous"},
      {key:"noDoc",      label:"Sans docs"},
      {key:"progress",   label:"En cours"},
      {key:"suspens",    label:"En suspens"},
      {key:"done",       label:"Terminés"},
      {key:"cloture",    label:"Clôture ce mois"},
    ]},
    {label:"Régime", filters:[
      {key:"mensuel",    label:"Mensuel"},
      {key:"trimestriel",label:"Trim."},
      {key:"annuel",     label:"Annuel"},
      {key:"association",label:"Asso."},
      {key:"acompte",    label:"Acompte"},
    ]},
  ];

  const filtered=useMemo(()=>{
    let data=rows.filter(r=>!r.archived); // exclure archivés du tableau principal
    if(search) data=data.filter(r=>r.client.toLowerCase().includes(search.toLowerCase()));
    if(filter==="noDoc")        data=data.filter(r=>!r.docsRecu);
    if(filter==="done")         data=data.filter(r=>getRowStatus(r,refDate)==="done");
    if(filter==="progress")     data=data.filter(r=>getComptaStatus(r)==="progress"&&!(r.snoozeUntil&&r.snoozeUntil>todayStr()));
    if(filter==="suspens")      data=data.filter(r=>!!r.snoozeUntil&&r.snoozeUntil>todayStr());
    if(filter==="relances")     data=data.filter(r=>(r.relances||[]).length>0);
    // ── MODIFIÉ : filtre clôture = mois comptable (M-1) ──
    if(filter==="cloture")      data=data.filter(r=>{
      const dc = new Date(new Date().getFullYear(), new Date().getMonth() - 1, 1);
      return (r.clotureMois||1) === dc.getMonth() + 1;
    });
    if(regimeFilters.length>0) data=data.filter(r=>{const reg=r.regime||"mensuel";return regimeFilters.some(k=>k==="association"?isAssociation(r):reg===k);});
    if(tvaJoursFilter.length>0){
      const hasSansTva=tvaJoursFilter.includes("sans-tva");
      const dayFilters=tvaJoursFilter.filter(d=>d!=="sans-tva");
      data=data.filter(r=>{
        if(!hasTVA(r)) return hasSansTva;
        const day=parseInt(r.tvaDayOfMonth);
        return dayFilters.includes(day);
      });
    }
    data.sort((a,b)=>{
      const today=todayStr();
      const aSnooze=a.snoozeUntil&&a.snoozeUntil>today;
      const bSnooze=b.snoozeUntil&&b.snoozeUntil>today;
      // Morts tout en bas, snoozés juste au-dessus
      if(a.mort&&!b.mort) return 1;
      if(!a.mort&&b.mort) return -1;
      if(aSnooze&&!bSnooze) return 1;
      if(!aSnooze&&bSnooze) return -1;
      let va,vb;
      if(sortBy==="jours"){va=daysUntilNext(a,refDate)??99999;vb=daysUntilNext(b,refDate)??99999;}
      else if(sortBy==="compta"){const o={todo:0,progress:1,done:2,none:3};va=o[getComptaStatus(a)];vb=o[getComptaStatus(b)];}
      else{va=(a[sortBy]??"").toString().toLowerCase();vb=(b[sortBy]??"").toString().toLowerCase();}
      if(va<vb) return sortDir==="asc"?-1:1;
      if(va>vb) return sortDir==="asc"?1:-1;
      return 0;
    });
    return data;
  },[rows,search,filter,regimeFilters,tvaJoursFilter,sortBy,sortDir,refDate]);
  filteredRef.current=filtered;

  const stats=useMemo(()=>{
    const active=rows.filter(r=>!r.archived);
    const base=filter!=="all"||regimeFilters.length>0||search.trim()||tvaJoursFilter.length>0?filtered:active;
    return({
    total:base.length,
    done:base.filter(r=>getRowStatus(r,refDate)==="done").length,
    inProgress:base.filter(r=>getComptaStatus(r)==="progress"&&!(r.snoozeUntil&&r.snoozeUntil>todayStr())).length,
    inSuspens:base.filter(r=>!!r.snoozeUntil&&r.snoozeUntil>todayStr()).length,
    traiter:base.filter(r=>getComptaStatus(r)==="todo"||getComptaStatus(r)==="none").length,
    tvaUrgent:base.filter(r=>{const d=daysUntilNext(r,refDate);return d!==null&&d<=7;}).length,
    noDoc:base.filter(r=>!r.docsRecu).length,
    archived:rows.filter(r=>r.archived).length,
  });},[rows,filtered,filter,regimeFilters,search,tvaJoursFilter,refDate]);

  const setSort=col=>{if(sortBy===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortBy(col);setSortDir("asc");}};
  const SI=col=>sortBy===col?(sortDir==="asc"?"↑":"↓"):"";
  const TH=({label,col,noSort})=>(
    <th onClick={noSort?undefined:()=>setSort(col)}
      style={{padding:"11px 12px",textAlign:"center",fontSize:10.5,fontWeight:700,color:C.light,letterSpacing:1,textTransform:"uppercase",cursor:noSort?"default":"pointer",userSelect:"none",whiteSpace:"nowrap"}}
      onMouseEnter={e=>{if(!noSort)e.currentTarget.style.color=C.muted;}} onMouseLeave={e=>{e.currentTarget.style.color=C.light;}}>
      {label}{!noSort&&SI(col)?` ${SI(col)}`:""}
    </th>);

  const regColor=r=>({mensuel:C.blue,trimestriel:C.lav,annuel:C.teal,association:C.purple,acompte:"#d97a1a"})[r]||C.blue;
  const regLabel=r=>({mensuel:"Mensuel",trimestriel:"Trim.",annuel:"Annuel",association:"Asso.",acompte:"Acompte"})[r]||r;

  if(!fbLoaded) return(
    <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",
      justifyContent:"center",background:C.bg,flexDirection:"column",gap:16}}>
      <div style={{fontSize:40}}>☁️</div>
      <div style={{fontSize:15,color:C.muted,fontWeight:600}}>Chargement de vos données…</div>
      <div style={{fontSize:12,color:C.light}}>Synchronisation Firebase en cours</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif",color:C.text}}>

        @keyframes urgentPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.4)}50%{box-shadow:0 0 0 5px rgba(220,38,38,0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
        @keyframes pulseBorder{0%,100%{box-shadow:inset 0 0 0 4px #c46b6b,inset 0 0 0 8px #c46b6b44;}50%{box-shadow:inset 0 0 0 4px #e08080,inset 0 0 0 20px #c46b6b22;}}

        .tr-row{transition:background .12s;}
        .tr-row:hover{background:${darkMode?"#322c28":"#faf9f7"} !important;}
        .tr-cloture{background:${darkMode?"#2e1e1e":"#fef5f5"} !important;}
        .tr-cloture:hover{background:${darkMode?"#3a2020":"#fdeaea"} !important;}
        .compta-cell{cursor:pointer;transition:all .15s;}
