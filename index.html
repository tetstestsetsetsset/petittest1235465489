          {/* ── Indicateur fichier JSON ── */}
          {(()=>{
            const noFile = syncStatus==="no-file" || !fsHandle;
            const dotColor = noFile ? C.red : syncStatus==="error" ? C.red : syncStatus==="syncing" ? C.amber : syncStatus==="synced" ? C.sage : "#ccc";
            const tip = noFile ? "⚠️ Aucun fichier connecté" : syncStatus==="syncing" ? "Sauvegarde…" : syncStatus==="error" ? "Erreur d'écriture" : syncStatus==="synced" ? "Fichier synchronisé ✓" : "…";
            const anim = (noFile || syncStatus==="error") ? "pulse 0.8s infinite" : syncStatus==="syncing" ? "pulse 1.2s infinite" : "none";
            return(
              <div title={tip} style={{
                width:11,height:11,borderRadius:"50%",
                background:dotColor,
                flexShrink:0,
                animation:anim,
                boxShadow: noFile ? `0 0 6px 2px ${C.red}88` : "none",
                transition:"background .4s",
                cursor:"default"
              }}/>
            );
          })()}
          {!fsHandle
            ? <button onClick={()=>connectFile(false)}
                style={{padding:"6px 12px",borderRadius:9,border:`1.5px solid ${C.sage}`,background:C.sageL,cursor:"pointer",color:C.sageD,fontSize:12,fontFamily:"inherit",fontWeight:700,display:"flex",alignItems:"center",gap:5}}
                title="Ouvrir un fichier JSON existant">
                📂 Ouvrir fichier JSON
              </button>
            : <button onClick={disconnectFile}
                style={{padding:"6px 12px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",color:C.muted,fontSize:11,fontFamily:"inherit",fontWeight:600}}
                title="Déconnecter le fichier JSON">

              </button>
          }

                return(
                  <button onClick={()=>{document.getElementById("snooze-date-input").value=val;}}
                    style={{padding:"7px 16px",borderRadius:7,border:`1.5px solid ${C.amber}`,background:C.amberL,cursor:"pointer",fontSize:12,color:"#a07800",fontFamily:"inherit",fontWeight:700}}>
                    📅 Après les TVA (après le 25)
                  </button>
                );
              })()}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:18}}>
              <button onClick={()=>setSnoozeId(null)} style={{padding:"9px 18px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",color:C.muted,fontSize:13,fontFamily:"inherit",fontWeight:600}}>Annuler</button>
              {isSnoozeActive&&<button onClick={()=>applySnooze(snoozeId,null)} style={{padding:"9px 18px",borderRadius:9,border:`1px solid ${C.border}`,background:C.bg,cursor:"pointer",color:C.muted,fontSize:13,fontFamily:"inherit",fontWeight:600}}>Annuler le snooze</button>}
              <button onClick={()=>{const v=document.getElementById("snooze-date-input").value;if(v)applySnooze(snoozeId,v);}} style={{padding:"9px 18px",borderRadius:9,border:"none",background:C.amber,cursor:"pointer",color:"#fff",fontSize:13,fontFamily:"inherit",fontWeight:700}}>😴 Snooze</button>
            </div>
          </div>
        </div>);})()} 
      {deleteId!==null&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,25,20,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}}
          onClick={e=>e.target===e.currentTarget&&setDeleteId(null)}>
          <div style={{background:C.card,borderRadius:16,padding:"28px 32px",width:360,textAlign:"center",boxShadow:C.shadowLg,animation:"slideUp .2s ease"}}>
            <div style={{fontSize:32,marginBottom:12}}>🗑️</div>
            <h4 style={{fontFamily:"'Lora',serif",fontSize:17,fontWeight:600,marginBottom:6}}>Supprimer ce dossier ?</h4>
            <p style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:4}}>{rows.find(r=>r.id===deleteId)?.client||""}</p>
            <p style={{fontSize:12,color:C.muted,marginBottom:22}}>Cette action est irréversible.</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button onClick={()=>setDeleteId(null)} style={{padding:"9px 20px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",color:C.muted,fontSize:14,fontFamily:"inherit",fontWeight:600}}>Annuler</button>
              <button onClick={handleDelete} style={{padding:"9px 20px",borderRadius:9,border:"none",background:C.red,cursor:"pointer",color:"#fff",fontSize:14,fontFamily:"inherit",fontWeight:700}}>Supprimer</button>
            </div>
          </div>
        </div>)}
      {toast&&(
        <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",zIndex:2000,
          background:toast.color,color:"#fff",borderRadius:12,padding:"11px 24px",fontSize:13.5,
          fontWeight:700,boxShadow:"0 6px 28px rgba(0,0,0,0.18)",animation:"slideUp .22s ease",
          pointerEvents:"none",whiteSpace:"nowrap",fontFamily:"'DM Sans',sans-serif"}}>
          {toast.msg}
        </div>)}
      {cmdOpen&&<CommandPalette rows={rows} open={cmdOpen} onClose={()=>setCmdOpen(false)}
        query={cmdQuery} setQuery={setCmdQuery}
        setFilter={setFilter} setPage={setPage} openAdd={openAdd}
        setSearch={setSearch} setComptaRow={setComptaRow}
        setReviewMode={v=>{setReviewMode(v);setReviewIdx(0);}}/>}
      {showLog&&<ActivityLogModal log={activityLog} onClose={()=>setShowLog(false)}/>}
      {reviewMode&&<ReviewModeOverlay rows={rows} filtered={filtered} onClose={()=>setReviewMode(false)}/>}
      {showSuspens&&(()=>{
        const snoozed=rows.filter(r=>!r.archived&&!!r.snoozeUntil&&r.snoozeUntil>todayStr());
        return(
        <div style={{position:"fixed",inset:0,background:"rgba(30,25,20,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}}
          onClick={e=>e.target===e.currentTarget&&setShowSuspens(false)}>
          <div style={{background:C.card,borderRadius:20,padding:"28px 32px",width:560,maxWidth:"95vw",boxShadow:C.shadowLg,animation:"slideUp .22s ease",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div>
                <div style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:600}}>📅 En suspens</div>
                <div style={{fontSize:12,color:C.muted,marginTop:2}}>{snoozed.length} dossier{snoozed.length>1?"s":""} — tâches restantes</div>
              </div>
              <button onClick={()=>setShowSuspens(false)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:C.muted,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            {snoozed.length===0
              ?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,color:C.light,padding:"30px 0"}}><span style={{fontSize:32}}>😴</span><div style={{fontSize:13,fontWeight:600,color:C.muted}}>Aucun dossier en suspens</div></div>
              :<div style={{overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
                {snoozed.map(row=>{
                  const en=ALL_TASKS.filter(t=>row.tasksEnabled?.[t.key]);
                  const remaining=en.filter(t=>!row.tasksDone?.[t.key]);
                  const done=en.filter(t=>row.tasksDone?.[t.key]);
                  const pct=en.length?Math.round(done.length/en.length*100):0;
                  return(
                    <div key={row.id} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:remaining.length?10:0}}>
                        <div>
                          <span style={{fontSize:14,fontWeight:700,color:C.text}}>{row.client}</span>
                          <span style={{fontSize:11,color:C.muted,marginLeft:8}}>jusqu'au {fmtDate(row.snoozeUntil)}</span>
                        </div>
                        <span style={{fontSize:12,fontWeight:700,color:pct===100?C.sage:C.amber}}>{pct}%</span>
                      </div>
                      {remaining.length===0
                        ?<div style={{fontSize:12,color:C.sage,fontWeight:600}}>✓ Toutes les tâches sont faites</div>
                        :<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                          {remaining.map(t=>(
                            <span key={t.key} style={{fontSize:12,padding:"3px 10px",borderRadius:99,background:C.card,border:`1px solid ${C.border}`,color:C.muted,display:"flex",alignItems:"center",gap:4}}>
                              <span>{t.icon}</span><span>{t.label}</span>
                            </span>))}
                        </div>}
                    </div>);
                })}
              </div>}
          </div>
        </div>);
      })()}
      {showArchives&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,25,20,.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"}}
          onClick={e=>e.target===e.currentTarget&&setShowArchives(false)}>
          <div style={{background:C.card,borderRadius:20,padding:"28px 32px",width:600,maxWidth:"95vw",boxShadow:C.shadowLg,animation:"slideUp .22s ease",maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontFamily:"'Lora',serif",fontSize:18,fontWeight:600}}>📦 Archives ({rows.filter(r=>r.archived).length})</div>
              <button onClick={()=>setShowArchives(false)} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:C.muted,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            {rows.filter(r=>r.archived).length===0
              ?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,color:C.light,padding:"30px 0"}}><span style={{fontSize:32}}>📦</span><div style={{fontSize:13,fontWeight:600,color:C.muted}}>Aucun dossier archivé</div></div>
              :<div style={{overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
                {rows.filter(r=>r.archived).sort((a,b)=>a.client.localeCompare(b.client)).map(row=>(
                  <div key={row.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderRadius:10,background:C.bg,border:`1px solid ${C.border}`}}>
                    <div>
                      <span style={{fontSize:14,fontWeight:600,color:C.text}}>{row.client}</span>
                      {row.archivedAt&&<span style={{fontSize:11,color:C.muted,marginLeft:8}}>archivé le {fmtDate(row.archivedAt)}</span>}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>unarchiveRow(row.id)} style={{padding:"5px 12px",borderRadius:7,border:`1px solid ${C.sage}`,background:C.sageL,cursor:"pointer",color:C.sageD,fontSize:12,fontWeight:700,fontFamily:"inherit"}}>📤 Désarchiver</button>
                      <button onClick={()=>setDeleteId(row.id)} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #f0c0c0",cursor:"pointer",color:C.red,background:C.redL,fontSize:12,fontFamily:"inherit"}}>✕</button>
                    </div>
                  </div>))}
              </div>}
          </div>
        </div>)}
      {showRecap&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:3000,background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"16px 24px",boxShadow:C.shadowLg,animation:"slideUp .3s ease",maxWidth:"90vw",width:480}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{fontFamily:"'Lora',serif",fontSize:15,fontWeight:600}}>🌅 Récap de la journée</div>
            <button onClick={()=>dismissRecap(false)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:16,color:C.muted,lineHeight:1}}>✕</button>
          </div>
          {(()=>{
            const r=buildRecap();
            const parts=[];
            if(r.validated>0) parts.push(`${r.validated} dossier${r.validated>1?"s":""} mis à jour`);
            if(r.tva>0) parts.push(`${r.tva} TVA traitée${r.tva>1?"s":""}`);
            if(r.relances>0) parts.push(`${r.relances} relance${r.relances>1?"s":""}`);
            if(r.docs>0) parts.push(`${r.docs} doc${r.docs>1?"s":""} reçu${r.docs>1?"s":""}`);
            return parts.length>0
              ?<div style={{fontSize:13,color:C.text,marginBottom:12,lineHeight:1.6}}>{parts.join(", ")}.</div>
              :<div style={{fontSize:13,color:C.muted,fontStyle:"italic",marginBottom:12}}>Aucune activité enregistrée aujourd'hui.</div>;
          })()}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>dismissRecap(false)} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",color:C.muted,fontSize:12,fontFamily:"inherit"}}>Ignorer</button>
            <button onClick={()=>{dismissRecap(true);setPage("recap");}} style={{padding:"6px 14px",borderRadius:8,border:"none",background:C.lav,cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>Sauvegarder & voir</button>
          </div>
        </div>)}
    </div>);
}

// ══════════════════════════════════════════════════════════════════
// 🔐 ÉCRAN DE CONNEXION
// ══════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin }) {
  const [email, setEmail]   = React.useState("");
  const [pwd,   setPwd]     = React.useState("");
  const [err,   setErr]     = React.useState("");
  const [loading, setLoading] = React.useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setErr(""); setLoading(true);
    try {
      const fb = window.__fb;
      await fb.signInWithEmailAndPassword(fb.auth, email, pwd);
      onLogin();
    } catch (ex) {
      setErr("Email ou mot de passe incorrect.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{
      position:"fixed", inset:0, zIndex:99999,
      background:"linear-gradient(135deg,#f4f2ef 0%,#e8e3dc 100%)",
      display:"flex", alignItems:"center", justifyContent:"center",
    }}>
      <div style={{
        background:"#fff", borderRadius:24, padding:"48px 52px",
        maxWidth:420, width:"90vw", textAlign:"center",
        boxShadow:"0 32px 80px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.06)",
      }}>
        <div style={{fontSize:52, marginBottom:16, lineHeight:1}}>🔐</div>
        <div style={{fontFamily:"serif", fontSize:22, fontWeight:700, color:"#28251f", marginBottom:6}}>
          Suivi Comptable
        </div>
        <div style={{fontSize:13, color:"#9e978d", marginBottom:32}}>
          Connectez-vous pour accéder à vos dossiers
        </div>
        <div style={{textAlign:"left", marginBottom:16}}>
          <label style={{fontSize:12, fontWeight:700, color:"#6d9b78", display:"block", marginBottom:6, letterSpacing:.4}}>
            EMAIL
          </label>
          <input
            type="email"
            value={email}
            onChange={e => setEmail(e.target.value)}
            placeholder="votre@email.com"
            style={{width:"100%", boxSizing:"border-box", padding:"12px 14px", borderRadius:10,
              border:"1.5px solid #e8e3dc", fontSize:14, fontFamily:"inherit", outline:"none",
              background:"#fafaf9", color:"#28251f"}}
            onFocus={e=>e.target.style.borderColor="#6d9b78"}
            onBlur={e=>e.target.style.borderColor="#e8e3dc"}
          />
        </div>
        <div style={{textAlign:"left", marginBottom:24}}>
          <label style={{fontSize:12, fontWeight:700, color:"#6d9b78", display:"block", marginBottom:6, letterSpacing:.4}}>
            MOT DE PASSE
          </label>
          <input
            type="password"
            value={pwd}
            onChange={e => setPwd(e.target.value)}
            placeholder="••••••••"
            onKeyDown={e => e.key==="Enter" && handleLogin(e)}
            style={{width:"100%", boxSizing:"border-box", padding:"12px 14px", borderRadius:10,
              border:"1.5px solid #e8e3dc", fontSize:14, fontFamily:"inherit", outline:"none",
              background:"#fafaf9", color:"#28251f"}}
            onFocus={e=>e.target.style.borderColor="#6d9b78"}
            onBlur={e=>e.target.style.borderColor="#e8e3dc"}
          />
        </div>
        {err && (
          <div style={{background:"#fceaea", color:"#c46b6b", borderRadius:8,
            padding:"10px 14px", fontSize:13, marginBottom:16, textAlign:"left"}}>
            ⚠️ {err}
          </div>
        )}
        <button onClick={handleLogin} disabled={loading}
          style={{width:"100%", padding:"14px 0", borderRadius:12, border:"none",
            background: loading ? "#a8c5b0" : "#6d9b78",
            cursor: loading ? "not-allowed" : "pointer",
            fontSize:15, color:"#fff", fontFamily:"inherit", fontWeight:700,
            letterSpacing:.3, boxShadow:"0 4px 16px rgba(109,155,120,0.35)",
            transition:"all .18s"}}>
          {loading ? "Connexion…" : "Se connecter →"}
        </button>
        <div style={{fontSize:11, color:"#c2bab0", marginTop:20, lineHeight:1.6}}>
          🔒 Vos données sont chiffrées et stockées en toute sécurité sur Firebase
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// 🌐 WRAPPER PRINCIPAL AVEC AUTH
// ══════════════════════════════════════════════════════════════════
function Root() {
  const [fbReady,      setFbReady]      = React.useState(!!window.__fbReady);
  const [authed,       setAuthed]       = React.useState(false);
  const [checkingAuth, setCheckingAuth] = React.useState(true);

  React.useEffect(() => {
    if (window.__fbReady) { setFbReady(true); return; }
    const handler = () => setFbReady(true);
    window.addEventListener("fb-ready", handler);
    return () => window.removeEventListener("fb-ready", handler);
  }, []);

  React.useEffect(() => {
    if (!fbReady) return;
    const fb = window.__fb;
    const unsub = fb.onAuthStateChanged(fb.auth, (user) => {
      setAuthed(!!user);
      setCheckingAuth(false);
    });
    return () => unsub();
  }, [fbReady]);

  if (!fbReady || checkingAuth) {
    return (
      <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",
        justifyContent:"center",background:"#f4f2ef",flexDirection:"column",gap:16}}>
        <div style={{fontSize:40}}>⏳</div>
        <div style={{fontSize:14,color:"#9e978d"}}>Connexion en cours…</div>
      </div>
    );
  }

  if (!authed) {
    return <LoginScreen onLogin={() => setAuthed(true)} />;
  }

  return <App />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
